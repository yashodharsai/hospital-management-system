<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">Hospital Management System</div>
        <nav class="nav-actions">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/patients}">Patients</a>
            <a th:href="@{/reports}">Reports</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </header>
    <section class="page-hero">
        <div class="page-title">
            <span class="portal-badge">Chairman Portal</span>
            <h1>Doctor Accounts</h1>
            <p>Create and manage doctor logins. Doctors cannot self-register.</p>
        </div>
    </section>
    <main class="main">
        <div class="card-actions">
            <a class="button" th:href="@{/doctors/new}">Add Doctor</a>
        </div>
        <section class="table-card">
            <table th:if="${!doctors.isEmpty()}">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doctor : ${doctors}">
                    <td th:text="${doctor.fullName}">Doctor</td>
                    <td th:text="${doctor.username}">username</td>
                    <td th:text="${doctor.email}">email</td>
                    <td th:text="${doctor.phone}">phone</td>
                    <td><a class="button danger" th:href="@{/doctors/{id}/delete(id=${doctor.id})}">Delete</a></td>
                </tr>
                </tbody>
            </table>
            <div class="empty-state" th:if="${doctors.isEmpty()}">No doctor accounts yet.</div>
        </section>
    </main>
</div>
</body>
</html>
