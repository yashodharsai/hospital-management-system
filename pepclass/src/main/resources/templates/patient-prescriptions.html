<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Prescriptions</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">Hospital Management System</div>
        <nav class="nav-actions">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/patient-reports}">My Reports</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </header>
    <section class="page-hero">
        <div class="page-title">
            <span class="portal-badge">Patient Portal</span>
            <h1>My Prescriptions</h1>
            <p>View medicines and dosage instructions prescribed for you.</p>
        </div>
    </section>
    <main class="main">
        <section class="list-card">
            <h2>Your Prescriptions</h2>
            <ul class="report-list" th:if="${!prescriptions.isEmpty()}">
                <li th:each="prescription : ${prescriptions}">
                    <strong th:text="${prescription.medicineName}">Medicine</strong>
                    <p th:text="${prescription.dosage}">Dosage</p>
                    <p th:text="${prescription.instructions}">Instructions</p>
                </li>
            </ul>
            <div class="empty-state" th:if="${prescriptions.isEmpty()}">No prescriptions are available yet.</div>
        </section>
    </main>
</div>
</body>
</html>
