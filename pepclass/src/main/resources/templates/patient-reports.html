<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports — MediCare Plus</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            </div>
            <span>MediCare Plus</span>
        </div>
        <nav class="nav-actions">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/my-prescriptions}">My Prescriptions</a>
            <a th:href="@{/patient-reports}" style="color: var(--primary); font-weight: 700;">My Reports</a>
            <form class="logout-form" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="button secondary" style="min-height: 38px; padding: 0 16px; border-radius: 999px;">Logout</button>
            </form>
        </nav>
    </header>

    <section class="page-hero">
        <div class="page-title">
            <span class="portal-badge">Patient Portal</span>
            <h1>My Medical Reports</h1>
            <p>Review diagnostic results, lab summaries, and download full report files.</p>
        </div>
    </section>

    <main class="main">
        <section class="portal-card">
            <h2 style="font-size: 1.3rem; font-weight: 800; margin: 0 0 16px;">Available Medical Reports</h2>
            <div th:if="${!reports.isEmpty()}" style="display: grid; gap: 16px;">
                <div th:each="report : ${reports}" style="border: 1px solid var(--line); border-radius: 12px; padding: 24px; background: white; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong style="font-size: 1.15rem; color: var(--ink); display: block;" th:text="${report.title}">Report Title</strong>
                        <p style="margin: 6px 0 0; color: #64748b; font-size: 0.92rem;" th:text="${report.notes ?: 'No summary notes available.'}">Notes</p>
                    </div>
                    <a class="btn-pill-primary" style="padding: 8px 20px; font-size: 0.88rem;" th:href="@{/reports/{id}/download(id=${report.id})}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 4px;">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        Download Report
                    </a>
                </div>
            </div>
            <div class="empty-state" th:if="${reports.isEmpty()}">No medical reports are linked to your account yet.</div>
        </section>
    </main>
</div>
</body>
</html>
