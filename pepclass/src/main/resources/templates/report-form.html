<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Medical Report — MediCare Plus</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            </div>
            <span>MediCare Plus</span>
        </div>
        <nav class="nav-actions">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/reports}">Reports</a>
            <form class="logout-form" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="button secondary" style="min-height: 38px; padding: 0 16px; border-radius: 999px;">Logout</button>
            </form>
        </nav>
    </header>

    <section class="page-hero">
        <div class="page-title">
            <span class="portal-badge">Chairman Portal</span>
            <h1>Medical Report Entry</h1>
            <p>Attach lab results, diagnosis notes, and text content for patient access.</p>
        </div>
    </section>

    <main class="main">
        <section class="portal-card" style="max-width: 800px; margin: 0 auto;">
            <form class="form-grid" th:action="@{/reports}" th:object="${report}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{uploadedBy}">
                <input type="hidden" th:field="*{createdAt}">

                <div class="field">
                    <label for="patient">Select Patient</label>
                    <select id="patient" th:field="*{patient}" required>
                        <option value="">Select patient</option>
                        <option th:each="patient : ${patients}" th:value="${patient.id}" th:text="${patient.fullName}">Patient</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="field">
                        <label for="title">Report Title</label>
                        <input id="title" th:field="*{title}" placeholder="e.g. Blood Test & Lipid Profile" required>
                    </div>
                    <div class="field">
                        <label for="fileName">File Attachment Name</label>
                        <input id="fileName" th:field="*{fileName}" placeholder="e.g. blood_test_july2026.txt">
                    </div>
                </div>

                <div class="field">
                    <label for="notes">Summary Notes</label>
                    <textarea id="notes" th:field="*{notes}" placeholder="Brief diagnostic summary or findings..."></textarea>
                </div>

                <div style="border-top: 1px dashed var(--line); margin: 16px 0; padding-top: 16px;">
                    <h3 style="font-size: 1.05rem; font-weight: 700; color: var(--ink); margin-bottom: 12px;">🏥 Patient Discharge Information</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="field">
                            <label for="dischargeDate">Target / Actual Discharge Date</label>
                            <input id="dischargeDate" type="date" th:field="*{dischargeDate}">
                        </div>
                        <div class="field">
                            <label for="dischargeStatus">Discharge Status</label>
                            <select id="dischargeStatus" th:field="*{dischargeStatus}">
                                <option value="">Select Discharge Status</option>
                                <option value="Under Observation">Under Observation</option>
                                <option value="Scheduled for Discharge">Scheduled for Discharge</option>
                                <option value="Ready for Discharge">Ready for Discharge</option>
                                <option value="Discharged">Discharged</option>
                            </select>
                        </div>
                    </div>
                    <div class="field" style="margin-top: 12px;">
                        <label for="dischargeSummary">Discharge Summary & Medical Advice</label>
                        <textarea id="dischargeSummary" th:field="*{dischargeSummary}" placeholder="Post-discharge care instructions, home care guidelines, or discharge condition summary..."></textarea>
                    </div>
                </div>

                <div class="field">
                    <label for="reportContent">Full Medical Report Content</label>
                    <textarea id="reportContent" th:field="*{reportContent}" placeholder="Detailed report text contents..."></textarea>
                </div>

                <div class="card-actions" style="margin-top: 12px;">
                    <button type="submit" class="btn-pill-primary">Save Medical Report</button>
                    <a class="button secondary" th:href="@{/reports}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
