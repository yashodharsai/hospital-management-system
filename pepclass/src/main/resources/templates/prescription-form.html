<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Prescription — MediCare Plus</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            </div>
            <span>MediCare Plus</span>
        </div>
        <nav class="nav-actions">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/prescriptions}">Prescriptions</a>
            <form class="logout-form" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="button secondary" style="min-height: 38px; padding: 0 16px; border-radius: 999px;">Logout</button>
            </form>
        </nav>
    </header>

    <section class="page-hero">
        <div class="page-title">
            <span class="portal-badge">Prescription Setup</span>
            <h1>Issue Digital Prescription</h1>
            <p>Assign medicine schedule, dosage timing, food instructions, duration, and diagnosis.</p>
        </div>
    </section>

    <main class="main">
        <section class="portal-card" style="max-width: 840px; margin: 0 auto;">
            <form class="form-grid" th:action="@{/prescriptions}" th:object="${prescription}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{prescribedBy}">
                <input type="hidden" th:field="*{createdAt}">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="field">
                        <label for="patient">Select Patient</label>
                        <select id="patient" th:field="*{patient}" required>
                            <option value="">Select patient</option>
                            <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName}">Patient</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="diagnosis">Clinical Diagnosis / Condition</label>
                        <input id="diagnosis" th:field="*{diagnosis}" placeholder="e.g. Acute Viral Fever & Bronchitis" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="field">
                        <label for="medicineName">Medicine Name</label>
                        <input id="medicineName" th:field="*{medicineName}" placeholder="e.g. Paracetamol 650mg" required>
                    </div>
                    <div class="field">
                        <label for="dosage">Dosage Instructions</label>
                        <input id="dosage" th:field="*{dosage}" placeholder="e.g. 1 Tablet (650mg)" required>
                    </div>
                </div>

                <div class="field">
                    <label>Dosage Schedule (Select All Applicable Times)</label>
                    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 6px;">
                        <label style="display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer;">
                            <input type="checkbox" name="morning" value="Morning" th:checked="${prescription.morning != null}" style="width: 18px; height: 18px;"> 🌅 Morning
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer;">
                            <input type="checkbox" name="afternoon" value="Afternoon" th:checked="${prescription.afternoon != null}" style="width: 18px; height: 18px;"> ☀️ Afternoon
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer;">
                            <input type="checkbox" name="evening" value="Evening" th:checked="${prescription.evening != null}" style="width: 18px; height: 18px;"> 🌆 Evening
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer;">
                            <input type="checkbox" name="night" value="Night" th:checked="${prescription.night != null}" style="width: 18px; height: 18px;"> 🌙 Night
                        </label>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                    <div class="field">
                        <label for="foodTiming">Food Timing</label>
                        <select id="foodTiming" th:field="*{foodTiming}" required>
                            <option value="After Food">After Food</option>
                            <option value="Before Food">Before Food</option>
                            <option value="With Food">With Food</option>
                            <option value="Empty Stomach">Empty Stomach</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="duration">Duration</label>
                        <input id="duration" th:field="*{duration}" placeholder="e.g. 5 Days / 14 Days" required>
                    </div>

                    <div class="field">
                        <label for="followUpDate">Follow-Up Date</label>
                        <input id="followUpDate" type="date" th:field="*{followUpDate}">
                    </div>
                </div>

                <div class="field">
                    <label for="instructions">Special Doctor Guidance / Diet Notes</label>
                    <textarea id="instructions" th:field="*{instructions}" placeholder="e.g. Drink plenty of fluids, avoid cold water, take rest..."></textarea>
                </div>

                <div class="card-actions" style="margin-top: 12px;">
                    <button type="submit" class="btn-pill-primary">Issue Prescription</button>
                    <a class="button secondary" th:href="@{/prescriptions}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
