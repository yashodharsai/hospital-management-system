<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">Hospital Management System</div>
        <nav class="nav-actions">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/prescriptions}">Prescriptions</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </header>
    <section class="page-hero">
        <div class="page-title">
            <span class="portal-badge">Prescriptions</span>
            <h1>Prescription Details</h1>
            <p>Record medicine, dosage, and instructions for a patient.</p>
        </div>
    </section>
    <main class="main">
        <section class="content-card">
            <form class="form-grid" th:action="@{/prescriptions}" th:object="${prescription}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{prescribedBy}">
                <input type="hidden" th:field="*{createdAt}">
                <div class="field">
                    <label for="patient">Patient</label>
                    <select id="patient" th:field="*{patient}" required>
                        <option value="">Select patient</option>
                        <option th:each="patient : ${patients}" th:value="${patient.id}" th:text="${patient.fullName}">Patient</option>
                    </select>
                </div>
                <div class="two-column">
                    <div class="field">
                        <label for="medicineName">Medicine</label>
                        <input id="medicineName" th:field="*{medicineName}" required>
                    </div>
                    <div class="field">
                        <label for="dosage">Dosage</label>
                        <input id="dosage" th:field="*{dosage}" required>
                    </div>
                </div>
                <div class="field">
                    <label for="instructions">Instructions</label>
                    <textarea id="instructions" th:field="*{instructions}"></textarea>
                </div>
                <div class="card-actions">
                    <button type="submit">Save Prescription</button>
                    <a class="button secondary" th:href="@{/prescriptions}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
